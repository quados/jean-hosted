services:
  jean:
    # Thin build over the upstream prebuilt headless image that adds Node.js, so
    # npx-based MCP servers / skills (e.g. Caveman) can install and run. See
    # Dockerfile — pin the base tag there for reproducible deploys.
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - JEAN_HEADLESS=1
      # Must bind 0.0.0.0 inside the container so the Coolify proxy can reach it.
      - JEAN_HOST=0.0.0.0
      - JEAN_PORT=3456
      # Token auth is REQUIRED for any non-localhost bind. Coolify auto-generates a
      # long random value; never disable this on an internet-exposed instance.
      - JEAN_TOKEN=${SERVICE_PASSWORD_JEANTOKEN}
      # Put Jean's embedded CLIs (claude, codex, opencode, gh, …) on PATH. They
      # live in per-tool dirs under the data volume and are normally invoked by
      # full path, so they're off PATH. npx-based installers that auto-detect
      # agents via `command -v claude` (e.g. Caveman) need them here, else every
      # agent reads "Missing". Standard dirs kept last (node/npx stay at /usr/bin).
      - PATH=/home/jean/.local/share/com.jean.desktop/claude-cli:/home/jean/.local/share/com.jean.desktop/codex-cli:/home/jean/.local/share/com.jean.desktop/opencode-cli:/home/jean/.local/share/com.jean.desktop/commandcode-cli:/home/jean/.local/share/com.jean.desktop/gh-cli:/home/jean/.local/share/com.jean.desktop/coderabbit-cli:/home/jean/.local/share/com.jean.desktop/rtk-cli:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Coolify auto-generates the domain/FQDN from the exposed port and routes it
      # through the proxy. The browser UI is served from that domain, so the default
      # same-origin policy already covers it — only set JEAN_ALLOWED_ORIGINS if you
      # need cross-origin access from a different host.
    # Anonymous host port only — the domain is configured in the Coolify UI and the
    # proxy terminates TLS. Never map a fixed host port (e.g. 3456:3456): that bypasses
    # the proxy and exposes the token-gated service directly.
    ports:
      - "3456"
    volumes:
      # Whole home dir: persists CLI logins/tokens (Claude ~/.claude(.json), gh
      # ~/.config/gh, codex ~/.codex, git ~/.gitconfig, ssh ~/.ssh) across rebuilds.
      # Without this, every redeploy wipes the writable layer and you re-login.
      - jean-home:/home/jean
      # App data (projects, preferences, sessions). Mounted separately because the
      # image declares VOLUME on this exact path — an explicit named mount overrides
      # the anonymous volume Docker would otherwise recreate (and lose) on rebuild.
      - jean-data:/home/jean/.local/share/com.jean.desktop
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3456/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  jean-home:
  jean-data:
